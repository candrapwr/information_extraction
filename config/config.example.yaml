server:
  host: "0.0.0.0"
  port: 8000
  debug: true
  use_reloader: false

local_model:
  enabled: true
  preload_on_start: true
  backend: "llama_cpp_python"
  model_path: "./model/Nanonets-OCR-s-Q4_0.gguf"
  mmproj_path: "./model/Nanonets-OCR-s-mmproj-F16.gguf"
  model_source:
    auto_download: true
    repo_id: "unsloth/Nanonets-OCR-s-GGUF"
    revision: "main"
    files:
      model: "Nanonets-OCR-s-Q4_0.gguf"
      mmproj: "mmproj-F16.gguf"
  model_name: "Nanonets-OCR-s"
  chat_handler: "qwen2.5-vl"
  ctx_size: 8192
  n_gpu_layers: -1
  n_threads: 4
  n_threads_batch: 4
  n_batch: 2048
  n_ubatch: 512
  flash_attn: true
  op_offload: true
  max_tokens: 512
  temperature: 0
  json_mode: false
  verbose: false
  use_mmap: true
  use_mlock: false
  warmup_on_start: true
  default_template: "ktp"
  prompt: "Return JSON matching schema exactly. Same keys only. Values only, no labels. Use null if unreadable."

templates:
  ktp:
    province: null
    city: null
    nik: null
    name: null
    birth_place: null
    birth_date: null
    gender: null
    blood_type: null
    address: null
    rt_rw: null
    kelurahan_desa: null
    kecamatan: null
    religion: null
    marital_status: null
    occupation: null
    nationality: null
    valid_until: null
  passport:
    passport_number: null
    name: null
    nationality: null
    date_of_birth: null
    gender: null
    expiration_date: null
    country_code: null
