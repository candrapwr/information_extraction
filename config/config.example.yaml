server:
  host: "0.0.0.0"
  port: 8000
  debug: true
  use_reloader: false

local_model:
  enabled: true
  preload_on_start: true
  backend: "llama_cpp_python"
  model_path: "./model/Nanonets-OCR-s-Q4_0.gguf"
  mmproj_path: "./model/Nanonets-OCR-s-mmproj-F16.gguf"
  model_source:
    auto_download: true
    repo_id: "unsloth/Nanonets-OCR-s-GGUF"
    revision: "main"
    files:
      model: "Nanonets-OCR-s-Q4_0.gguf"
      mmproj: "mmproj-F16.gguf"
  model_name: "Nanonets-OCR-s"
  chat_handler: "qwen2.5-vl"
  ctx_size: 8192
  n_gpu_layers: -1
  n_threads: 4
  n_threads_batch: 4
  n_batch: 2048
  n_ubatch: 512
  flash_attn: true
  op_offload: true
  max_tokens: 512
  temperature: 0
  json_mode: false
  verbose: false
  use_mmap: true
  use_mlock: false
  warmup_on_start: true
  default_template: "ktp"
  prompt: "Extract fields from this Indonesian KTP (ID card). For each key, write only the value found on the card. Use null if a field is missing or unreadable. Output JSON only."

image_preprocess:
  enabled: false
  max_width: 768
  max_height: 768
  jpeg_quality: 85
  jpeg_optimize: false
  reencode_if_unchanged: false

ktp_preprocess:
  # Khusus template "ktp": crop kartu, verifikasi NIK, resize seragam.
  # Berjalan SEBELUM image_preprocess umum. Hanya memakai OpenCV (tanpa OCR).
  # Jika kartu/NIK gagal terdeteksi -> error HTTP 400 (lihat api.py).
  enabled: true
  target_width: 856
  target_height: 540
  ideal_ratio: 1.585           # rasio fisik KTP (85.6mm x 54mm)
  card_ratio_min: 1.2
  card_ratio_max: 2.2
  frame_ratio_min: 1.4         # bila frame input sudah rasio KTP dan blob kecil
  frame_ratio_max: 1.8         # -> skip crop (anti over-crop pada tight scan)
  blob_subregion_frac: 0.45    # ambang: blob <45% area frame = teks dalam kartu
  verify_nik: true
  nik_confidence_threshold: 0.45
  nik_strong_threshold: 0.70
  nik_digit_min: 6
  nik_digit_max: 45
  save_steps: true
  debug_dir: "./debug_ktp"
  pad_color: [255, 255, 255]
  jpeg_quality: 90

templates:
  ktp:
    provinsi: null
    kabupaten_kota: null
    nik: null
    nama: null
    tempat_tgl_lahir: null
    jenis_kelamin: null
    gol_darah: null
    alamat: null
    rt_rw: null
    kel_desa: null
    kecamatan: null
    agama: null
    status_perkawinan: null
    pekerjaan: null
    kewarganegaraan: null
    berlaku_hingga: null
  passport:
    passport_number: null
    name: null
    nationality: null
    date_of_birth: null
    gender: null
    expiration_date: null
    country_code: null
